<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新株予約権評価報告書 生成ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      padding: 40px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #4a6cf7; }
    textarea { resize: vertical; min-height: 60px; }
    .row {
      display: flex;
      gap: 12px;
    }
    .row > div { flex: 1; }
    .company-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .company-name.loading { color: #999; }
    .separator {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover { background: #2d2d5e; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.loading { display: block; background: #eef2ff; color: #4a6cf7; }
    .status.success { display: block; background: #efffef; color: #2a7d2a; }
    .status.error { display: block; background: #fff0f0; color: #c00; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #4a6cf7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type="file"] {
      padding: 8px;
      font-size: 13px;
      border: 1px dashed #ccc;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>新株予約権評価報告書</h1>
    <p class="subtitle">必要な項目を入力して報告書を生成してください</p>

    <div class="row">
      <div>
        <label for="ticker">上場コード *</label>
        <input type="text" id="ticker" maxlength="5" inputmode="numeric">
      </div>
      <div>
        <label for="evalDate">評価基準日 *</label>
        <input type="date" id="evalDate">
      </div>
    </div>

    <div class="company-name" id="companyName"></div>

    <hr class="separator">

    <div class="row">
      <div>
        <label for="exerciseStart">権利行使期間（開始）</label>
        <input type="date" id="exerciseStart">
      </div>
      <div>
        <label for="exerciseEnd">権利行使期間（終了）</label>
        <input type="date" id="exerciseEnd">
      </div>
    </div>

    <label for="resolutionDate">決議日</label>
    <input type="date" id="resolutionDate">

    <div class="row">
      <div>
        <label for="warrantTotal">新株予約権の総個数</label>
        <input type="text" id="warrantTotal">
      </div>
      <div>
        <label for="issuableShares">行使による発行株式総数</label>
        <input type="text" id="issuableShares">
      </div>
    </div>

    <label for="fairValue">1株あたりの公正価値</label>
    <p class="hint">入力すると株価比率（公正価値÷株価）を自動計算して報告書に反映</p>
    <input type="text" id="fairValue">

    <label for="specialTerms">算定に関する特約事項</label>
    <textarea id="specialTerms"></textarea>

    <hr class="separator">

    <div class="row">
      <div>
        <label for="riskFreeRate">リスクフリーレート（%）</label>
        <input type="text" id="riskFreeRate">
      </div>
      <div>
        <label for="marketRiskPremium">市場リスクプレミアム（%）</label>
        <input type="text" id="marketRiskPremium">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="beta">対指数β</label>
        <input type="text" id="beta">
      </div>
      <div>
        <label for="creditCost">クレジット・コスト（%）</label>
        <input type="text" id="creditCost">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="bondName">国債銘柄名</label>
        <p class="hint">例: 長期国債362</p>
        <input type="text" id="bondName">
      </div>
      <div>
        <label for="bondMaturity">国債償還日</label>
        <input type="date" id="bondMaturity">
      </div>
    </div>

    <hr class="separator">

    <label for="monthlyFile">月次株価データ（ボラティリティ計算用）</label>
    <p class="hint">SPEEDAからエクスポートした月次株価Excel</p>
    <input type="file" id="monthlyFile" accept=".xlsx,.xls,.csv">

    <label for="dailyFile">日次株価・出来高データ（出来高中央値計算用）</label>
    <p class="hint">SPEEDAからエクスポートした日次株価Excel</p>
    <input type="file" id="dailyFile" accept=".xlsx,.xls,.csv">

    <label for="bondFile">売買参考統計値（リスクフリーレート用）</label>
    <p class="hint">日本証券業協会の売買参考統計値 .xls</p>
    <input type="file" id="bondFile" accept=".xlsx,.xls">

    <label for="betaImage">β値スクリーンショット</label>
    <p class="hint">SPEEDAのβ値画面のスクリーンショット</p>
    <input type="file" id="betaImage" accept="image/*">

    <button id="generateBtn" onclick="generate()">報告書を生成</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    document.getElementById('evalDate').value = new Date().toISOString().split('T')[0];

    // 上場コード入力時に会社名を自動取得
    let lookupTimer = null;
    document.getElementById('ticker').addEventListener('input', function() {
      const code = this.value.trim();
      const el = document.getElementById('companyName');
      clearTimeout(lookupTimer);
      if (code.length >= 4) {
        el.textContent = '取得中...';
        el.className = 'company-name loading';
        lookupTimer = setTimeout(() => {
          fetch('/api/lookup?code=' + encodeURIComponent(code))
            .then(r => r.json())
            .then(data => {
              if (data.name) {
                el.textContent = data.name;
                el.className = 'company-name';
              } else {
                el.textContent = '会社名を取得できませんでした';
                el.className = 'company-name loading';
              }
            })
            .catch(() => {
              el.textContent = '';
              el.className = 'company-name';
            });
        }, 500);
      } else {
        el.textContent = '';
        el.className = 'company-name';
      }
    });

    async function generate() {
      const ticker = document.getElementById('ticker').value.trim();
      const evalDate = document.getElementById('evalDate').value;
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');

      if (!ticker || !evalDate) {
        status.className = 'status error';
        status.textContent = '上場コードと評価基準日を入力してください。';
        return;
      }

      const payload = {
        ticker_code: ticker,
        eval_date: evalDate,
        exercise_start: document.getElementById('exerciseStart').value,
        exercise_end: document.getElementById('exerciseEnd').value,
        resolution_date: document.getElementById('resolutionDate').value,
        warrant_total: document.getElementById('warrantTotal').value.trim(),
        issuable_shares: document.getElementById('issuableShares').value.trim(),
        fair_value_per_share: document.getElementById('fairValue').value.trim(),
        special_terms: document.getElementById('specialTerms').value.trim(),
        risk_free_rate: document.getElementById('riskFreeRate').value.trim(),
        market_risk_premium: document.getElementById('marketRiskPremium').value.trim(),
        beta: document.getElementById('beta').value.trim(),
        credit_cost: document.getElementById('creditCost').value.trim(),
        bond_name: document.getElementById('bondName').value.trim(),
        bond_maturity: document.getElementById('bondMaturity').value,
      };

      btn.disabled = true;
      status.className = 'status loading';
      status.innerHTML = '<span class="spinner"></span>データ取得・報告書生成中...（30秒ほどかかります）';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'サーバーエラー');
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        let filename = `報告書_${ticker}.docx`;
        const match = disposition.match(/filename\*=UTF-8''(.+)/);
        if (match) filename = decodeURIComponent(match[1]);

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        status.className = 'status success';
        status.textContent = `${filename} をダウンロードしました。`;
      } catch (e) {
        status.className = 'status error';
        status.textContent = `エラー: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
